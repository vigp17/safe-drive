# AV-RL PPO Configuration
# Local smoke test:  python train.py --test   (overrides num_envs=4, total_steps=10k)
# Full AWS run:      python train.py --full

env:
  num_scenarios: 100
  traffic_density: 0.1
  map: 4
  start_seed: 0
  accident_prob: 0.0
  decision_repeat: 5

ppo:
  total_steps: 5_000_000
  num_envs: 64             # AWS: 64  |  local test: overridden to 4
  rollout_steps: 512       # steps collected per env per update
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  update_epochs: 10
  num_minibatches: 4
  hidden: 256

logging:
  project: "av-rl"
  run_name: "ppo-metadrive-v1"
  log_interval: 10         # log every N PPO updates
  save_interval: 50        # checkpoint every N updates