# AV-RL PPO Configuration
# Local smoke test:  python train.py --test   (overrides num_envs=4, total_steps=10k)
# Full AWS run:      python train.py --full

env:
  num_scenarios: 100
  traffic_density: 0.1
  map: 4
  start_seed: 0
  accident_prob: 0.0
  decision_repeat: 5

# Reward v2 — these DOMINATE MetaDrive's small internal penalties so the
# safety/goal tradeoff is under our explicit control. Tune these in the
# validation loop (a YAML edit, no code change). Diagnosis that drove the
# rebalance: with crash_penalty=15 the agent earned ~76 reward *while
# crashing*, so "rush and crash" was net-positive. These values make a
# crash clearly net-negative while keeping arrival the dominant payoff.
reward:
  crash_penalty: 80.0         # was 15.0 — too weak
  out_of_road_penalty: 40.0   # explicit now (leaving the road is a real failure)
  success_bonus: 200.0        # the jackpot
  completion_bonus: 50.0      # x route_completion at episode end

ppo:
  total_steps: 10_000_000
  num_envs: 16             # PER SEED. sweep.py runs 1 seed/GPU, so on the
                           # 4-GPU g4dn.12xlarge that's 4 x 16 = 64 envs over
                           # 48 vCPUs. Do NOT set to 64 here — that becomes
                           # 4 x 64 = 256 envs and chokes the CPUs.
  rollout_steps: 512       # steps collected per env per update
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  ent_coef: 0.001     # was 0.01 — too high, fought against the policy ever
                      # sharpening (entropy grew 2.8 -> 6.3 over training)
  vf_coef: 0.5
  max_grad_norm: 0.5
  update_epochs: 10
  num_minibatches: 4
  hidden: 256

logging:
  project: "av-rl"
  run_name: "ppo-metadrive-v1"
  log_interval: 10         # log every N PPO updates
  save_interval: 50        # checkpoint every N updates